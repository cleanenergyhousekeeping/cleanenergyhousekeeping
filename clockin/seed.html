<script>
  (function () {
    const SHELL_AUTH_KEY = "ce_shell_auth_v1";
    const APPS_SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbxDiNx-ab3J45CuljJ5QQ0cc1e-ZbFyWLqMfOCPa8I0niZX9A4OQNEZpWVzSkolYdCm/exec";

    const statusText = document.getElementById("statusText");
    const openShellBtn = document.getElementById("openShellBtn");

    function parseHashParams_() {
      const raw = window.location.hash.replace(/^#/, "");
      return new URLSearchParams(raw);
    }

    async function fetchPrepPayload_(token) {
      const url =
        APPS_SCRIPT_URL +
        "?mode=getOfflineShellPrep&token=" +
        encodeURIComponent(token);

      const response = await fetch(url, { method: "GET", cache: "no-store" });
      if (!response.ok) {
        throw new Error("Prep request failed.");
      }

      return response.json();
    }

    const params = parseHashParams_();
    openShellBtn.classList.remove("hidden");

    if (params.get("clear") === "1") {
      localStorage.removeItem(SHELL_AUTH_KEY);
      statusText.textContent = "Offline mode was cleared on this phone.";
      return;
    }

    const token = params.get("token");
    if (!token) {
      statusText.textContent = "No offline prep token was received.";
      return;
    }

    fetchPrepPayload_(token)
      .then(function (res) {
        if (!res || !res.ok || !res.payload) {
          statusText.textContent =
            (res && res.message) || "Offline prep failed.";
          return;
        }

        localStorage.setItem(SHELL_AUTH_KEY, JSON.stringify(res.payload));

        const cleanerName = res.payload.cleanerName || "this cleaner";
        const currentShiftText =
          res.payload.currentShift && res.payload.currentShift.property
            ? ` Current shift: ${res.payload.currentShift.property}.`
            : "";

        statusText.textContent =
          `Offline mode is ready for ${cleanerName} on this phone.` +
          currentShiftText;
      })
      .catch(function () {
        statusText.textContent =
          "Offline prep failed. Please go back and try again while online.";
      });
  })();
</script>
