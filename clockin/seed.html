<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prepare Offline Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: #23343b;
    }

    .wrap {
      text-align: center;
      padding: 24px;
      max-width: 520px;
      width: 92vw;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 34px;
    }

    .statusText {
      margin-bottom: 16px;
      font-size: 17px;
      color: #4d6474;
      line-height: 1.45;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 16px 22px;
      border-radius: 14px;
      background: #649fca;
      color: #fff;
      border: none;
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      width: 100%;
      box-sizing: border-box;
    }

    .btnSecondary {
      background: #23343b;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prepare Offline Mode</h1>
    <p id="statusText" class="statusText">Preparing this phone for offline mode...</p>

    <a id="openShellBtn" class="btn btnSecondary hidden" href="/clockin/">Open Clock In Shell</a>
  </div>

  <script>
    (function () {
      const SHELL_AUTH_KEY = "ce_shell_auth_v1";
      const APPS_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbxDiNx-ab3J45CuljJ5QQ0cc1e-ZbFyWLqMfOCPa8I0niZX9A4OQNEZpWVzSkolYdCm/exec";

      const statusText = document.getElementById("statusText");
      const openShellBtn = document.getElementById("openShellBtn");

      function parseHashParams_() {
        const raw = window.location.hash.replace(/^#/, "");
        return new URLSearchParams(raw);
      }

      async function fetchPrepPayload_(token) {
        const url =
          APPS_SCRIPT_URL +
          "?mode=getOfflineShellPrep&token=" +
          encodeURIComponent(token);

        const response = await fetch(url, { method: "GET", cache: "no-store" });
        if (!response.ok) {
          throw new Error("Prep request failed.");
        }

        return response.json();
      }

      const params = parseHashParams_();
      openShellBtn.classList.remove("hidden");

      if (params.get("clear") === "1") {
  localStorage.removeItem(SHELL_AUTH_KEY);
  localStorage.removeItem("ce_shell_queue_v1");
  statusText.textContent = "Offline mode and queued entries were cleared on this phone.";
  return;
}

      const token = params.get("token");
      if (!token) {
        statusText.textContent = "No offline prep token was received.";
        return;
      }

      fetchPrepPayload_(token)
        .then(function (res) {
          if (!res || !res.ok || !res.payload) {
            statusText.textContent =
              (res && res.message) || "Offline prep failed.";
            return;
          }

/* begin[save_seed_then_auto_return_to_shell] */
          localStorage.setItem(SHELL_AUTH_KEY, JSON.stringify(res.payload));

          try {
            if (window.opener) {
              window.opener.postMessage({ type: "shell-seed-saved" }, "*");
            }
          } catch (_) {}

          const cleanerName = res.payload.cleanerName || "this cleaner";
          const currentShiftText =
            res.payload.currentShift && res.payload.currentShift.property
              ? ` Current shift: ${res.payload.currentShift.property}.`
              : "";

         statusText.textContent =
  `Offline mode is ready for ${cleanerName} on this phone.` +
  currentShiftText +
  " Seed saved. Returning to Clock In...";

          setTimeout(function () {
            window.location.replace("/clockin/");
          }, 900);
/* end[save_seed_then_auto_return_to_shell] */
        })
        .catch(function () {
          statusText.textContent =
            "Offline prep failed. Please go back and try again while online.";
        });
    })();
  </script>
</body>
</html>
